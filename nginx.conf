limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
limit_req_zone $binary_remote_addr zone=download:10m rate=5r/s;
limit_conn_zone $binary_remote_addr zone=conn:10m;

server {
    listen 80;
    server_name lootvault.dpdns.org 185.216.118.136;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name lootvault.dpdns.org 185.216.118.136;

    ssl_certificate /etc/letsencrypt/live/lootvault.dpdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/lootvault.dpdns.org/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 50m;
    limit_conn conn 20;

    gzip on;
    gzip_min_length 1000;
    gzip_comp_level 4;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_vary on;

    location /_next/static {
        alias /opt/gemevault/.next/static;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /images {
        alias /opt/gemevault/public/images;
        try_files $uri /images/default.svg;
        expires 7d;
        add_header Cache-Control "public";
    }

    location /api/download {
        limit_req zone=download burst=3 nodelay;
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;

        # 禁止任何缓存
        add_header Cache-Control "no-store, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        proxy_hide_header ETag;
        proxy_hide_header Last-Modified;
        add_header Last-Modified "" always;
        add_header ETag "" always;
    }

    location /api/ {
        limit_req zone=api burst=10 nodelay;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;

        # 禁止浏览器和 CDN 缓存 API
        add_header Cache-Control "no-store, max-age=0" always;
        add_header CDN-Cache-Control "no-cache, max-age=0" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        proxy_hide_header ETag;
        proxy_hide_header Last-Modified;
        add_header Last-Modified "" always;
        add_header ETag "" always;
    }


    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
        proxy_buffering on;

        # 隐藏 RSC Vary 头
        proxy_hide_header Vary;

        # 页面缓存 30s
        proxy_cache api_cache;
        proxy_cache_key "$scheme$host$request_uri";
        proxy_cache_valid 200 30s;
        proxy_cache_use_stale updating error timeout;
        proxy_cache_lock on;
        proxy_cache_lock_age 5s;
        proxy_cache_bypass $http_authorization $http_cookie;

        add_header X-Cache-Status $upstream_cache_status;
    }
}
